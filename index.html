<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 투자성향 테스트 · 매매 / 경매</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>

:root{
  --bg-0:#0b0b0d;
  --bg-1:#141417;
  --surface:rgba(255,255,255,.035);
  --surface-2:rgba(255,255,255,.06);
  --surface-3:rgba(255,255,255,.09);
  --ink:#f4f4f2;
  --ink-2:#d9d9d4;
  --muted:rgba(230,230,225,.58);
  --muted-2:rgba(230,230,225,.4);
  --line:rgba(255,255,255,.1);
  --line-strong:rgba(255,255,255,.18);
  --lime:#c8fa46;
  --lime-2:#a6e800;
  --lime-soft:rgba(200,250,70,.12);
  --lime-line:rgba(200,250,70,.4);
  --danger:#ff6a5a;
  --warn:#ffb454;
  --info:#5ab7ff;
  --success:#8fe08a;
  --shadow:0 26px 70px rgba(0,0,0,.5);
  --shadow-strong:0 34px 100px rgba(0,0,0,.6);
  --heading:'Gilroy','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --body:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --label:'Gilroy','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --maxw:1040px;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  margin:0; min-height:100vh; color:var(--ink);
  font-family:var(--body); line-height:1.65; letter-spacing:-.02em;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(circle at 18% -4%, rgba(200,250,70,.06), transparent 42%),
    radial-gradient(circle at 88% 6%, rgba(120,160,40,.05), transparent 40%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1));
  background-attachment:fixed;
  overflow-x:hidden;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;
  background-image:
    linear-gradient(rgba(210,255,60,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(210,255,60,.045) 1px, transparent 1px);
  background-size:46px 46px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.5), transparent 82%);
}
h1,h2,h3,h4,h5{ margin:0; font-family:var(--heading); font-weight:700; letter-spacing:-.04em; line-height:1.12; color:var(--ink); }
p{ margin-top:0; }
a{ color:var(--lime); text-decoration-thickness:1.5px; text-underline-offset:3px; }
::selection{ background:var(--lime); color:#101206; }
:focus-visible{ outline:3px solid rgba(200,250,70,.5); outline-offset:4px; }
.wrap{ width:min(var(--maxw),100%); margin:0 auto; padding:0 26px; }
.progress{ position:fixed; top:0; left:0; height:4px; width:0%; z-index:1000; background:linear-gradient(90deg,var(--lime-2),var(--lime)); box-shadow:0 0 18px rgba(200,250,70,.35); transition:width .45s var(--ease); }
.eyebrow{ display:inline-flex; align-items:center; gap:.65em; padding:9px 15px; border-radius:999px; color:var(--ink-2); font-family:var(--label); font-size:.72rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; background:var(--lime-soft); border:1px solid var(--lime-line); }
.eyebrow::before{ content:''; width:8px; height:8px; border-radius:999px; background:var(--lime); box-shadow:0 0 12px var(--lime); }
.screen{ display:none; min-height:100vh; padding:72px 0 96px; }
.screen.active{ display:block; animation:screenIn .46s var(--ease); }
.screen.active.hero{ display:flex; }
@keyframes screenIn{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:translateY(0);} }
.hero{ position:relative; text-align:center; overflow:hidden; align-items:center; }
.hero::before{ content:''; position:absolute; width:min(1120px,92vw); height:min(650px,78vh); left:50%; top:50%; transform:translate(-50%,-50%); border-radius:32px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.07); box-shadow:var(--shadow); }
.hero::after{ content:'REAL ESTATE · AI SIGNAL'; position:absolute; left:50%; bottom:40px; transform:translateX(-50%); color:rgba(200,250,70,.24); font-family:var(--label); font-size:clamp(.74rem,1.3vw,.95rem); font-weight:800; letter-spacing:.2em; white-space:nowrap; }
.blob{ position:absolute; pointer-events:none; z-index:0; opacity:.9; filter:blur(30px); }
.blob.b1{ width:400px; height:400px; left:2%; top:6%; border-radius:50%; background:radial-gradient(circle,rgba(200,250,70,.1),transparent 66%); animation:driftA 18s var(--ease) infinite; }
.blob.b2{ width:460px; height:460px; right:0; top:8%; border-radius:50%; background:radial-gradient(circle,rgba(120,160,40,.1),transparent 66%); animation:driftB 21s var(--ease) infinite; }
.blob.b3{ width:280px; height:280px; left:40%; bottom:6%; border-radius:50%; background:radial-gradient(circle,rgba(200,250,70,.07),transparent 66%); animation:driftC 24s var(--ease) infinite; }
@keyframes driftA{ 0%,100%{ transform:translate(0,0);} 50%{ transform:translate(26px,18px);} }
@keyframes driftB{ 0%,100%{ transform:translate(0,0);} 50%{ transform:translate(-22px,18px);} }
@keyframes driftC{ 0%,100%{ transform:translate(0,0);} 50%{ transform:translate(12px,-18px);} }
.hero .inner{ position:relative; z-index:2; padding-top:34px; padding-bottom:30px; }
.hero h1{ max-width:860px; margin:26px auto 18px; font-size:clamp(2.75rem,6.2vw,5.2rem); line-height:1.02; letter-spacing:-.05em; }
.hero h1 em{ display:inline-block; font-style:normal; background:linear-gradient(100deg,var(--lime),var(--lime-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
.lead{ max-width:720px; margin:0 auto 10px; color:var(--muted); font-size:clamp(1rem,1.45vw,1.18rem); font-weight:500; line-height:1.78; }
.track-grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; margin:40px auto 28px; max-width:900px; }
.track-card{ position:relative; overflow:hidden; text-align:left; min-height:230px; padding:30px; cursor:pointer; border-radius:20px; border:1px solid var(--line); background:var(--surface); box-shadow:0 20px 55px rgba(0,0,0,.4); transition:transform .28s var(--ease), box-shadow .28s var(--ease), border-color .28s var(--ease), background .28s var(--ease); }
.track-card::before{ content:''; position:absolute; inset:auto 24px 0 24px; height:4px; border-radius:999px 999px 0 0; background:linear-gradient(90deg,var(--lime),var(--lime-2)); opacity:0; transition:opacity .25s var(--ease); }
.track-card:hover{ transform:translateY(-5px); border-color:var(--line-strong); background:var(--surface-2); box-shadow:var(--shadow-strong); }
.track-card:hover::before{ opacity:.5; }
.track-card.sel{ border-color:var(--lime-line); background:rgba(200,250,70,.05); box-shadow:0 0 0 1px rgba(200,250,70,.25),0 26px 70px rgba(0,0,0,.5); }
.track-card.sel::before{ opacity:1; }
.track-card.sel::after{ content:'SELECTED'; position:absolute; right:22px; top:22px; font-family:var(--label); font-size:.6rem; font-weight:900; letter-spacing:.1em; color:#101206; background:var(--lime); padding:7px 11px; border-radius:999px; }
.track-card .ico{ display:grid; place-items:center; width:56px; height:56px; margin-bottom:22px; border-radius:16px; font-size:1.7rem; background:rgba(255,255,255,.05); border:1px solid var(--line); }
.track-card h3{ font-size:1.5rem; margin:0 0 10px; font-weight:800; }
.track-card p{ margin:0; color:var(--muted); font-size:.98rem; font-weight:500; line-height:1.68; }
.track-card .axes{ display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; }
.miniaxis,.kchip,.sc-tag{ display:inline-flex; align-items:center; border-radius:999px; padding:7px 11px; font-family:var(--label); font-size:.69rem; font-weight:800; letter-spacing:-.01em; color:var(--ink-2); background:rgba(255,255,255,.05); border:1px solid var(--line); }
.btn{ appearance:none; border:0; border-radius:999px; padding:15px 28px; cursor:pointer; font-family:var(--label); font-size:.95rem; font-weight:800; transition:transform .22s var(--ease), box-shadow .22s var(--ease), background .22s var(--ease), color .22s var(--ease), border-color .22s var(--ease), opacity .22s var(--ease); }
.btn-primary{ color:#101206; background:linear-gradient(100deg,var(--lime),var(--lime-2)); box-shadow:0 16px 40px rgba(200,250,70,.22); }
.btn-primary:hover{ transform:translateY(-2px); box-shadow:0 22px 52px rgba(200,250,70,.3); }
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; background:rgba(255,255,255,.14); color:rgba(230,230,225,.5); }
.btn-ghost{ color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--line); }
.btn-ghost:hover{ transform:translateY(-2px); border-color:var(--lime-line); color:var(--lime); box-shadow:0 14px 34px rgba(0,0,0,.4); }
.btn-row{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; align-items:center; }
.note{ margin-top:18px; color:var(--muted-2); font-size:.88rem; font-weight:600; }
.quiz-top{ display:flex; align-items:center; justify-content:space-between; gap:16px; max-width:860px; margin:0 auto 12px; }
.qtrack{ font-family:var(--label); font-size:.8rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); }
.qcount{ color:var(--muted); font-family:var(--label); font-size:.84rem; font-weight:700; }
.bar{ max-width:860px; height:9px; margin:0 auto 36px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,.07); border:1px solid var(--line); }
.bar > span{ display:block; height:100%; width:0; border-radius:999px; background:linear-gradient(90deg,var(--lime-2),var(--lime)); box-shadow:0 0 14px rgba(200,250,70,.35); transition:width .42s var(--ease); }
#q-body{ max-width:860px; margin:0 auto; padding:38px; border-radius:24px; border:1px solid var(--line); background:var(--surface-2); box-shadow:var(--shadow); }
.qkind{ display:inline-flex; align-items:center; gap:8px; margin-bottom:18px; padding:7px 11px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid var(--line); }
.qkind .dot{ width:8px; height:8px; border-radius:999px; background:var(--lime); box-shadow:0 0 10px var(--lime); }
.qkind .dot.profile{ background:var(--info); box-shadow:0 0 10px var(--info); }
.qkind span{ color:var(--muted); font-family:var(--label); font-size:.72rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; }
.qtext{ max-width:780px; margin:0 0 12px; font-size:clamp(1.62rem,2.7vw,2.32rem); line-height:1.25; letter-spacing:-.045em; }
.qsub{ margin:0 0 26px; color:var(--muted); font-size:.98rem; font-weight:500; }
.opts{ display:flex; flex-direction:column; gap:13px; }
.opt{ width:100%; min-height:70px; display:flex; align-items:center; gap:16px; text-align:left; padding:19px 20px; border-radius:16px; border:1px solid var(--line); color:var(--ink); background:rgba(255,255,255,.03); cursor:pointer; font-family:var(--body); font-size:1rem; font-weight:600; line-height:1.55; transition:transform .22s var(--ease), border-color .22s var(--ease), background .22s var(--ease), box-shadow .22s var(--ease); }
.opt:hover{ transform:translateX(5px); border-color:var(--line-strong); background:rgba(255,255,255,.05); }
.opt.sel{ border-color:var(--lime-line); background:rgba(200,250,70,.06); box-shadow:0 0 0 1px rgba(200,250,70,.22); }
.opt .mark{ position:relative; flex:none; width:25px; height:25px; border-radius:999px; border:2px solid rgba(255,255,255,.24); background:rgba(255,255,255,.04); transition:all .2s var(--ease); }
.opt.sel .mark{ border-color:transparent; background:var(--lime); box-shadow:0 0 0 6px rgba(200,250,70,.12); }
.opt.sel .mark::after{ content:''; position:absolute; left:8px; top:5px; width:6px; height:10px; border:solid #101206; border-width:0 2px 2px 0; transform:rotate(45deg); }
.nav-row{ display:flex; justify-content:space-between; gap:14px; max-width:860px; margin:28px auto 0; }
.rhead{ position:relative; overflow:hidden; text-align:center; padding:48px 28px 38px; border-radius:26px; border:1px solid var(--line); background:var(--surface-2); box-shadow:var(--shadow); }
.rhead::before{ content:''; position:absolute; inset:0; height:5px; background:linear-gradient(90deg,var(--lime-2),var(--lime)); box-shadow:0 0 18px rgba(200,250,70,.4); }
.rcode{ position:relative; font-family:var(--heading); font-size:clamp(3rem,8vw,6.2rem); font-weight:700; letter-spacing:-.055em; line-height:.96; color:transparent; background:linear-gradient(100deg,var(--lime),var(--lime-2)); -webkit-background-clip:text; background-clip:text; }
.rname{ position:relative; margin-top:10px; font-family:var(--heading); font-size:clamp(1.35rem,2.8vw,2rem); font-weight:800; letter-spacing:-.04em; }
.rsummary{ position:relative; max-width:680px; margin:14px auto 0; color:var(--muted); font-size:1.05rem; font-weight:500; line-height:1.72; }
.chips{ position:relative; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:22px 0 4px; }
.kchip{ background:rgba(255,255,255,.05); color:var(--ink-2); }
.rare-pill{ display:inline-flex; margin-top:14px; padding:7px 12px; border-radius:999px; color:#101206; background:var(--lime); font-family:var(--label); font-size:.7rem; font-weight:900; letter-spacing:.04em; text-transform:uppercase; }
.axisrow{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin:26px 0; }
.axisbox,.panel,.guide-item,.sc-card,.cond-line,.reg-note,details.reg{ border:1px solid var(--line); background:var(--surface); box-shadow:0 16px 50px rgba(0,0,0,.35); }
.axisbox{ min-height:116px; padding:18px 14px; text-align:center; border-radius:16px; }
.axisbox .al{ color:var(--muted); font-family:var(--label); font-size:.66rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
.axisbox .av{ margin-top:9px; font-family:var(--heading); font-size:1.08rem; font-weight:800; letter-spacing:-.03em; line-height:1.25; }
.axisbox .ac{ display:inline-block; margin-right:6px; color:var(--lime); font-size:1.22em; }
.axisbox.bl{ border-color:rgba(255,180,84,.34); background:rgba(255,180,84,.06); }
.axisbox .blnote{ margin-top:7px; color:var(--warn); font-family:var(--label); font-size:.68rem; font-weight:900; }
.sec{ margin:28px 0; }
.sec-title{ display:flex; align-items:center; gap:10px; margin-bottom:14px; color:var(--muted); font-family:var(--label); font-size:.78rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; }
.sec-title::before{ content:''; width:34px; height:3px; border-radius:99px; background:linear-gradient(90deg,var(--lime),var(--lime-2)); }
.swb{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
.panel,.guide-item{ border-radius:18px; padding:22px; }
.panel h4,.guide-item h4{ margin-bottom:12px; font-size:1rem; letter-spacing:-.03em; line-height:1.3; color:var(--ink); }
.panel ul,.guide-item ul,.guide-item ol{ margin:0; padding-left:20px; }
.panel li,.guide-item li{ margin-bottom:7px; }
.panel p,.guide-item p{ margin:0 0 9px; }
.panel.strength{ border-color:rgba(143,224,138,.3); }
.panel.weakness{ border-color:rgba(255,180,84,.32); }
.panel.blind{ grid-column:1/-1; border-color:rgba(255,106,90,.3); background:rgba(255,106,90,.06); }
.panel.identity{ color:#101206; border-color:transparent; background:linear-gradient(135deg,var(--lime),var(--lime-2)); box-shadow:0 24px 70px rgba(200,250,70,.18); }
.panel.identity h4{ color:#101206; }
.panel.identity p{ margin:0; color:rgba(16,18,6,.82); font-size:1.08rem; line-height:1.78; font-weight:560; }
.guide-item h4{ color:var(--lime); }
.flag{ display:flex; gap:13px; align-items:flex-start; margin-bottom:12px; padding:18px; border-radius:16px; border:1px solid var(--line); box-shadow:0 14px 38px rgba(0,0,0,.3); }
.flag .fi{ flex:none; line-height:1.4; font-size:1.1rem; }
.flag .ft{ display:inline-flex; margin-bottom:7px; padding:4px 9px; border-radius:999px; color:#101206; font-family:var(--label); font-size:.64rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; }
.flag .fm{ font-size:.94rem; line-height:1.68; font-weight:500; color:var(--ink-2); }

.flag.danger .ft{ background:var(--danger); color:#1a0704; }
.flag.warn{ background:rgba(255,180,84,.08); border-color:rgba(255,180,84,.3); }
.flag.warn .ft{ background:var(--warn); }
.flag.info{ background:rgba(90,183,255,.08); border-color:rgba(90,183,255,.28); }
.flag.info .ft{ background:var(--info); }
.cond-line,.reg-note{ border-radius:14px; padding:15px 18px; color:var(--muted); font-size:.9rem; font-weight:500; line-height:1.62; }
.cond-line b,.reg-note b{ color:var(--ink); }
.reg-note b{ color:var(--info); }
.flag-foot,.sc-foot,.note,.disclaimer,footer{ color:var(--muted); }
.flag-foot{ margin-top:14px; font-size:.82rem; line-height:1.65; }
code{ border-radius:7px; padding:2px 6px; background:rgba(255,255,255,.08); color:var(--lime); }

details.reg>summary{ display:flex; align-items:center; gap:9px; cursor:pointer; list-style:none; padding:18px 20px; color:var(--ink); font-family:var(--label); font-weight:800; font-size:.92rem; }

.reg-body{ padding:0 20px 22px; }

.reg-body .reg-disc{ background:rgba(255,180,84,.07); border-color:rgba(255,180,84,.24); color:var(--ink-2); }

sage":"큰 자본으로 전국 안전물건을 운용하는 조합입니다. 원격 관리·공실·출구 리스크가 수익률을 깎을 수 있으니 현지 관리 체계와 매각 소요기간을 먼저 확인하세요."},{"when":{"region_regulated":"regulated"},"level":"warn","message":"경매 낙찰이라도 대출규제는 동일하게 적용됩니다. 경락잔금대출에도 규제지역 LTV(무주택 40% 수준)·다주택 주담대 금지·DSR 40%가 그대로 걸리니, 낙찰가 대비 실제 가용 대출을 보수적으로 잡고 자금계획을 점검하세요. (금융사별 경락대출 취급기준 차이는 확인 필요)"},{"when":{"region_regulated":"regulated"},"level":"info","message":"경매는 토지거래허가 대상 거래가 아니어서 토허구역의 2년 실거주 의무·갭투자 차단·자금조달계획서 제출 의무가 면제됩니다(일반매매 대비 규제 회피 가능). 다만 이 때문에 규제지역 경매에 수요가 몰려 낙찰가율이 높아지는 쏠림이 나타날 수 있으니 고가낙찰을 경계하세요. (자금출처 소명 등 세무 리스크는 별개)"},{"when":{"ownership":"multi","region_regulated":"regulated"},"level":"danger","message":"다주택자가 규제지역 물건을 추가 낙찰하면 경락잔금대출에도 다주택 추가구입 주담대 금지(LTV 0%)가 적용될 수 있습니다. 전액 자기자본 조달을 전제로 입찰가를 잡으세요. (개별 금융사 취급기준은 확인 필요)"},{"when":{"ownership":"none","region_regulated":"regulated"},"level":"info","message":"규제지역 무주택 경락대출은 LTV 40% 수준 + 6개월 전입의무가 적용될 수 있습니다. 다만 경매는 토허 실거주 의무 자체는 면제되니, 대출 조건과 실거주 요건을 분리해 확인하세요."},{"when":{"region_regulated":"unknown"},"level":"info","message":"물건 소재지의 규제지역 여부에 따라 대출 한도가 크게 달라집니다. 입찰 전 국토부 「조정대상지역 및 투기과열지구 지정」 페이지에서 규제 여부를 먼저 확인하세요."}],"types":[{"code":"A-scn","axes":{"FUND":"s","DIFFICULTY":"c","REGION":"n"},"name":"동네 안전 낙찰러","keywords":["소액분산","안전입찰","연고지"],"summary":"소액으로 익숙한 동네의 권리 깨끗한 물건을 안전하게 낙찰받는 입문형"},{"code":"A-scw","axes":{"FUND":"s","DIFFICULTY":"c","REGION":"w"},"name":"수익률 추적 안전러","keywords":["소액분산","안전입찰","전국추적"],"summary":"소액 안전물건을 전국에서 찾아 기회 폭을 넓히는 발품형"},{"code":"A-sxn","axes":{"FUND":"s","DIFFICULTY":"x","REGION":"n"},"name":"동네 특수물건 도전자","keywords":["소액분산","특수물건","연고지"],"summary":"소액으로 연고지 특수물건을 공략하는 도전형","rare":true},{"code":"A-sxw","axes":{"FUND":"s","DIFFICULTY":"x","REGION":"w"},"name":"무리한 원정 특수러","keywords":["소액분산","특수물건","전국"],"summary":"소액·특수·전국이 겹친 고위험 조합","rare":true},{"code":"A-bcn","axes":{"FUND":"b","DIFFICULTY":"c","REGION":"n"},"name":"우량 안전 낙찰러","keywords":["대액집중","안전입찰","연고지"],"summary":"큰 자본으로 연고지 우량 안전물건을 공략하는 자산가형"},{"code":"A-bcw","axes":{"FUND":"b","DIFFICULTY":" const PROFILES = {"M-SHRG":{"identity":"좋은 입지의 실거주 한 채를 대출 끼고 장기 보유하며 우상향을 노리는, 대한민국 실수요자의 표준.","strength":"- 검증된 입지(역세권·학군·일자리)를 고르므로 하락장에서도 덜 빠지고 회복이 빠르다.\n- 실거주 1주택이라 비과세·장특공제 등 세제 혜택을 온전히 누린다.\n- 주거 안정과 자산 증식을 한 채로 동시에 해결 — 의사결정이 단순하고 흔들림이 적다.","weakness":"- \"내가 살 수 있는 곳\"이라는 제약 때문에 더 수익 좋은 물건을 놓친다.\n- 한 채에 자산이 집중돼 분산이 없다. 그 지역이 정체되면 내 자산 전체가 정체된다.\n- 레버리지를 썼기에 금리 상승·소득 변동에 가계 현금흐름이 직접 노출된다.","blindspot":"당신은 \"실거주니까 가격이 빠져도 상관없다\"고 자기합리화하기 쉽다. 그러나 갈아타기를 염두에 둔다면 매도 시점의 시세와 상급지와의 갭은 당신의 미래 선택지를 직접 결정한다. 실거주라는 명분 뒤에 숨어 입지·환금성 검증을 게을리하면, 정작 더 좋은 곳으로 옮겨야 할 때 발이 묶인다. 또 DSR 한도까지 대출을 당겨놓고 \"버티면 된다\"고 믿는데, 버티는 동안의 이자·기회비용은 수익률에서 조용히 차감된다.","market":"상승장·회복장 초입에서 가장 강하다. 횡보장은 무난, 급락장에선 레버리지 부담을 견디는 인내가 시험대.","partner":"M-SHPE(자기자본·순수투자 — 분산과 레버리지 절제 감각), M-ATPG(공격·회전 — 시장 타이밍과 환금성 감각을 빌릴 것)."},"M-SHRE":{"identity":"빚 없이 우량 실거주 한 채를 마련해 마음 편히 오래 사는, 안정의 끝판왕.","strength":"- 무차입이라 금리·역전세·경기 충격에 거의 면역. 어떤 하락장도 버틴다.\n- 현금흐름에 여유가 있어 생활의 질과 심리적 안정이 높다.\n- 1주택 비과세를 그대로 누리며, 급매·기회가 왔을 때 즉시 동원할 신용 여력이 있다.","weakness":"- 레버리지를 안 쓰니 자산 증식 속도가 느리다. 상승장에서 남들보다 덜 번다.\n- 현금을 한 채에 묶어두는 기회비용이 크다 — 같은 돈으로 두 채를 굴릴 수 있었다.\n- 지나친 안전 추구로 \"더 좋은 입지로의 갈아타기\" 같은 합리적 모험도 회피하기 쉽다.","blindspot":"당신은 \"빚이 없으니 안전하다\"를 절대 명제로 믿지만, 무차입의 진짜 비용은 보이지 않는 기회비용이다. 인플레이션 시기에 현금·저레버리지는 실질 구매력을 갉아먹고, 우량 자산 상승분을 통째로 놓친다. 안전을 자산 방어로만 정의하면, 자산이 물가를 못 따라가는 '느린 손실'을 못 본다. 레버리지 자체가 악이 아니라 감당 못 할 레버리지가 악임을 구분하라.","market":"하락장·고금리 국면에서 압도적으로 강하다(현금이 왕). 상승장에선 상대적으로 소외.","partner":"M-SHRG·M-SHPG(적정 레버리지로 증식 속도를 빌릴 것)."},"M-SHPG":{"identity":"검증된 입지에 전세 레버리지로 묻어두고 시간을 내 편으로 만드는, 갭투자의 정석.","strength":"- 우량지 + 전세 레버리지 조합으로 적은 자기자본으로 우상향 자산을 선점한다.\n- 실거주 제약이 없어 오직 입지·수익률 기준으로 최적 물건을 고른다.\n- 장기 보유라 단기 변동을 무시하고 복리·시세 상승을 온전히 가져간다.","weakness":"- 전세가가 곧 레버리지이므로 역전세(전세가 하락) 시 보증금 반환 압박에 직격탄.\n- 다주택 경로로 가면 취득세·종부세·양도세 중과가 수익을 잠식한다.\n- 무주택자라면 실거주 한 채 마련을 미루다 정작 본인 주거가 불안정해질 수 있다.","blindspot":"당신은 \"우량지니까 전세는 늘 잘 나간다\"고 가정하지만, 전세 레버리지는 만기마다 재설정되는 단기 부채다. 입주 물량 폭탄이나 금리 급등으로 전세가가 빠지면, 보유한 장기 시나리오와 무관하게 당장 수천만 원을 토해내야 한다. '장기 보유'라는 말이 '아무것도 안 해도 된다'는 뜻이 아니다 — 전세 만기 캘린더와 역전세 대비 현금 버퍼를 항상 들고 있어야 한다. 또 무주택 상태로 남의 집만 사다가 청약·실거주 비과세 기회를 통째로 날리는 경우가 흔하다.","market":"상승장·전세가 상승기에 최강. 입주 폭탄·역전세 국면이 최대 약점.","partner":"M-SHRE(무차입 버퍼 감각), M-SHPE(자기자본 비중을 높여 역전세 방어)."},"M-SHPE":{"identity":"자기자본으로 우량 물건을 사서 느리지만 단단하게 불려가는, 리스크 없는 복리주의자.","strength":"- 무차입·우량 조합이라 역전세·금리에 흔들리지 않고 어떤 국면도 버틴다.\n- 순수투자 관점이라 감정 없이 수익률로만 판단, 물건 선택의 자유도가 높다.\n- 하락장에 현금 동원력으로 우량 급매를 줍는 역발상 매수가 가능하다.","weakness":"- 자본 회전·확장 속도가 느려 상승장 수익 극대화를 놓친다.\n- 좋은 기회 앞에서도 레버리지를 거부해 규모의 경제를 못 만든다.\n- 신중함이 지나쳐 매수 실행이 늦어 타이밍을 놓치는 경우가 있다.","blindspot":"\"단단함\"에 대한 자부심이 행동을 마비시킨다. 분석은 완벽한데 방아쇠를 못 당겨, 결국 검토만 하다 끝나는 분석마비에 빠지기 쉽다. 또 무차입을 고집하다 보면 자본 효율이 떨어져, 같은 안목으로 레버리지를 적정 사용한 사람 대비 장기 누적 수익이 크게 벌어진다. 안전한 게 아니라 '느린' 것일 수 있다는 점을 직시하라.","market":"하락장·횡보장에서 빛난다(현금·인내가 무기). 급등장에선 소외.","partner":"M-SHPG·M-ATPG(레버리지·실행 속도를 빌릴 것)."},"M-STRG":{"identity":"실거주하며 비과세 타이밍에 맞춰 상급지로 안전하게 환승하는 사다리 등반가.","strength":"비과세 요건을 활용한 절세 환승, 거주 안정과 자산 상승의 균형, 검증된 입지만 노려 리스크 통제.","weakness":"잦은 환승의 거래비용(취득세·중개비·이사), 갈아타기 타이밍에 시장이 역행하면 손실, 일시적 2주택 처분기한 압박.","blindspot":"갈아타기를 '항상 한 단계 위로' 가는 일방통행으로 가정하지만, 매도와 매수가 같은 시장에서 동시에 일어난다 — 상급지가 더 빨리 오르면 격차가 벌어져 영영 못 따라잡는다. 처분기한과 자금 조달의 타이밍 리스크를 과소평가하기 쉽다.","market":"횡보·완만한 상승장(상급지 갭이 안 벌어질 때).","partner":"M-SHRE(무리한 환승 절제), M-AHPG(상급지 선점 안목)."},"M-STRE":{"identity":"빚을 최소화하며 보수적으로 실거주를 갈아타는 돌다리 두드림형.","strength":"무리 없는 자금계획, 하락장 방어력, 거주 안정.","weakness":"환승 속도가 느려 기회 상실, 무차입 제약으로 상급지 진입 지연, 과도한 신중함.","blindspot":"신중함이 곧 안전이라 믿지만, 실거주 갈아타기는 미룰수록 상급지와의 격차가 복리로 벌어진다. '준비되면 옮기겠다'는 무한 연기로 끝나기 쉽다.","market":"하락·횡보장.","partner":"M-STRG, M-AHRG."},"M-STPG":{"identity":"검증된 물건만 골라 전세 레버리지로 짧게 회전하는 안전지향 단타러.","strength":"리스크 낮은 물건만 단기 회전해 자본 회전율↑, 입지 검증으로 환금성 확보.","weakness":"단기 양도세 중과로 세후 수익 급감, 거래비용 누적, 안전물건은 마진이 박함.","blindspot":"\"안전한 물건이니 잘 팔린다\"고 보지만 단타의 진짜 적은 양도세율(2년 미만 중과)과 거래비용이다. 세전 수익에 취해 세후 실수령을 계산 안 하면 헛심만 쓴다.","market":"거래 활발한 상승장.","partner":"M-SHPG(장기 전환 판단), M-SHPE."},"M-STPE":{"identity":"자기자본으로 안전한 물건만 짧게 차익 보려는, 다소 동기가 약한 보수적 단타러.","strength":"무차입 단타라 리스크 최소, 손실 회피 강함.","weakness":"보수+단기는 동기 충돌 — 안전물건 단기차익은 세후 남는 게 적다. 자본 비효율.","blindspot":"안전과 단기차익을 동시에 원하지만 이 둘은 본질적으로 상충한다. 어느 쪽도 제대로 못 챙기는 어중간한 포지션이 되기 쉽다. 장기보유나 적정 레버리지 중 하나로 정체성을 정하라.","market":"상승장 한정(그 외엔 매력 약함).","partner":"M-SHPE(장기 전환), M-ATPG."},"M-AHRG":{"identity":"개발 기대 지역에 실제로 살면서 대출 끼고 장기 시세차익을 노리는 실거주 베터.","strength":"거주하며 호재 실현을 기다려 주거비+투자 일석이조, 실거주 비과세 가능, 호재 적중 시 큰 차익.","weakness":"호재 지연·무산 리스크를 거주지에 그대로 안음, 정비사업 장기화 시 생활 불편, 레버리지+불확실성 이중 부담.","blindspot":"\"내가 사는 곳이 개발된다\"는 기대에 감정이 실려 호재의 실현 확률·시점을 낙관 편향한다. 정비사업은 평균 10년+, 무산도 흔하다. 실거주 만족도와 투자 기대를 분리해 냉정히 보라.","market":"상승장·개발 사이클 초입.","partner":"M-SHRG(검증입지 균형), M-AHPE."},"M-AHRE":{"identity":"현금으로 저평가 실거주지를 사서 묵묵히 장기 베팅하는 뚝심형.","strength":"무차입이라 호재 지연을 버틸 체력, 역발상 저가 매수, 거주 안정.","weakness":"자본 묶임, 호재 무산 시 기회비용, 무차입으로 확장 불가.","blindspot":"\"버틸 수 있으니 언젠간 오른다\"는 무한 인내가 함정. 호재가 영영 안 올 수도 있고, 그 사이 다른 우량지는 먼저 오른다. 시간도 비용이다.","market":"하락·횡보장 진입.","partner":"M-SHRE, M-AHPG."},"M-AHPG":{"identity":"재건축·재개발·정비사업 기대가 있는 저평가지에 전세·대출 레버리지를 태워 장기 보유하는, 호재 투자의 전형.","strength":"- 저평가 진입 + 호재 실현이 맞물리면 일반 우량지를 압도하는 수익(멀티배거)을 낸다.\n- 순수투자 관점이라 거주 제약 없이 사업성 좋은 구역만 골라 담는다.\n- 장기 보유 전제라 정비사업의 긴 호흡(조합 설립~이주~준공)을 견딜 구조를 짠다.","weakness":"- 정비사업은 지연·무산·분담금 폭탄 등 변수가 많아 시나리오가 자주 깨진다.\n- 레버리지 + 호재 불확실성의 이중 리스크 — 둘 다 어긋나면 손실이 증폭된다.\n- 사업 단계 중 환금성이 극히 낮아 급전이 필요할 때 못 판다.","blindspot":"당신은 호재의 '상승 시나리오'는 정교하게 그리지만, 시간 비용과 무산 리스크는 습관적으로 할인한다. 정비사업은 구역지정부터 입주까지 평균 10년이 넘고, 조합 내분·분담금 급등·경기 침체로 멈추는 경우가 절반에 가깝다. \"결국 된다\"는 믿음으로 분담금 추가 납입과 장기 자금 동결을 견디는 동안, 같은 돈을 우량지에 넣었다면 얻었을 수익(기회비용)이 당신의 실질 수익률을 갉아먹는다. 사업단계(조합설립인가·사업시행인가·관리처분인가)별 리스크가 천차만별인데 이를 뭉뚱그려 '호재'로 퉁치는 것도 위험하다. 진입 단계가 빠를수록 수익은 크지만 무산 확률도 크다.","market":"상승장·유동성 확장기(사업 추진력↑). 고금리·침체기엔 사업 지연 직격탄.","partner":"M-SHPG(검증입지로 포트폴리오 안정), M-SHPE(현금 버퍼로 분담금 대비)."},"M-AHPE":{"identity":"자기자본으로 저평가 물건을 사두고 시장이 알아줄 때까지 인내하는 역발상가.","strength":"무차입이라 무한정 버티는 체력, 남들 외면할 때 줍는 역발상, 호재 적중 시 무레버리지로도 큰 차익.","weakness":"자본이 오래 묶임, 저평가가 '저평가인 채로' 정체될 위험, 확장 불가.","blindspot":"\"싸니까 안전하다\"는 가치투자 신념이 함정 — 싼 데는 이유가 있을 수 있고, 카탈리스트(상승 촉매) 없는 저평가는 영원히 저평가다. 가격이 아니라 '무엇이 가격을 올릴 것인가'를 봐야 한다.","market":"하락장 바닥·횡보장.","partner":"M-AHPG(호재 안목), M-ATPG(타이밍·실행)."},"M-ATRG":{"identity":"호재 지역으로 실거주를 빠르게 환승하며 레버리지를 적극 활용하는 공격적 사다리꾼.","strength":"빠른 환승으로 상승 흐름 갈아타기, 레버리지로 진입장벽 돌파, 호재 선점.","weakness":"잦은 거래비용+단기 양도세, 레버리지+공격+단기 삼중 리스크, 타이밍 실패 시 큰 손실.","blindspot":"실거주라는 명분으로 사실상 고위험 단타를 하면서 위험을 과소평가한다. 갈아탈 때마다 시장·세금·자금이 동시에 맞아떨어져야 하는데, 한 박자만 어긋나도 사다리에서 미끄러진다.","market":"강한 상승장.","partner":"M-STRG(절제), M-SHRG."},"M-ATRE":{"identity":"현금으로 공격적 실거주 단기 환승을 하는 드문 현금부자 역발상가.","strength":"무차입이라 공격 베팅도 버팀, 빠른 의사결정, 현금 협상력.","weakness":"공격+무차입+단기는 부자연한 조합(보통 공격은 레버리지 동반), 자본 비효율, 거래비용.","blindspot":"현금 동원력을 과신해 단기 공격 베팅의 변동성을 가볍게 본다. 무차입이어도 단타 양도세와 잘못된 타이밍은 그대로 손실이다. 희귀 조합인 만큼 본인 성향이 정말 이쪽인지 재점검하라.","market":"변동성 큰 상승장.","partner":"M-SHRE, M-ATPG."},"M-ATPG":{"identity":"저평가·호재 물건을 풀레버리지로 단기 회전시키는, 매매 트랙 최고 위험·최고 수익의 승부사.","strength":"- 레버리지를 극대화해 적은 자기자본으로 큰 포지션을 잡고, 적중 시 수익률이 폭발적이다.\n- 시장 타이밍·호재 흐름에 민감해 기회 포착과 진입·청산이 빠르다.\n- 자본 회전이 빨라 한 사이클의 수익을 곧장 다음 기회에 재투입, 복리 가속.","weakness":"- 풀레버리지 + 단기 + 공격물건 = 삼중 위험. 하나만 어긋나도 손실이 증폭된다.\n- 단기 양도세 중과로 세전 수익의 상당분이 증발한다.\n- 금리·역전세·거래 위축에 가장 먼저, 가장 크게 노출된다.","blindspot":"당신은 몇 번의 성공으로 '내가 시장을 읽는다'는 과신에 빠지기 가장 쉬운 유형이다. 풀레버리지 단타는 상승장에선 천재처럼 보이지만, 그건 실력이 아니라 시장이 받쳐준 결과일 수 있다. 유동성이 마르고 거래가 멈추는 순간 — 팔아서 빠져나와야 할 때 못 파는 환금성 함정 — 에 풀레버리지는 마진콜로 돌변한다. 출구가 막힌 단타는 강제 장기보유가 되고, 그땐 이자가 당신을 갉아먹는다. 수익 시나리오만큼 '못 팔았을 때'의 자금 시나리오를 똑같이 정교하게 짜라. 그리고 세후 수익으로만 성과를 측정하라.","market":"거래량 폭발하는 강한 상승장에서만 강하다. 횡보·하락장에선 가장 위험.","partner":"M-SHPE(현금 버퍼·역전세 방어), M-SHRE(브레이크 역할)."},"M-ATPE":{"identity":"자기자본으로 저평가 물건을 짧게 차익 실현하는 드문 현금형 공격 단타러.","strength":"무차입이라 레버리지 리스크 없이 공격 베팅, 빠른 청산, 하락 버퍼.","weakness":"공격+무차입+단기는 동기 약한 희귀 조합, 자본 비효율, 단기 양도세.","blindspot":"무차입이라 안전하다 여기지만 단타의 진짜 비용은 세금과 타이밍이다. 공격 물건을 짧게 굴리면서 레버리지를 안 쓰는 건 수익 잠재력을 스스로 깎는 셈 — 정체성을 장기보유(M-AHPE)나 레버리지 회전(M-ATPG) 중 하나로 명확히 하라.","market":"변동성 상승장.","partner":"M-AHPE, M-ATPG.\n\n---\n\n# 경매(競賣) 트랙 16유형\n\n> 개인화 변수(경매경험·주택보유상황)는 가이드에서 경고로 반영. 프로필은 성향 골격."},"A-scn":{"identity":"소액으로 익숙한 동네의 권리 깨끗한 물건을 낙찰받는, 경매 입문의 표준형.","strength":"- 잘 아는 동네라 시세·임차수요·학군을 파악하기 쉽다.\n- 권리 단순 물건 위주라 권리분석 실패 리스크가 낮다.\n- 소액 접근이라 자금 부담이 작고 첫 경험을 쌓기 좋다.","weakness":"- 안전·연고지 물건은 경쟁자가 많아 낙찰가율이 높다.\n- 기회 풀이 좁고 수익 규모가 작을 수 있다.\n- 초보가 많아 경매라는 사실에 취해 고가낙찰하기 쉽다.","blindspot":"당신의 가장 큰 위험은 권리분석보다 입찰가다. 안전한 물건일수록 사람이 몰려 시세에 근접하거나 오히려 비싸게 낙찰받기 쉽다. 최근 실거래·급매가를 기준으로 입찰 상한선을 먼저 정하고, 그 선을 넘으면 미련 없이 포기해야 한다.","market":"어느 국면에서도 무난하다. 하락장에는 낙찰가율이 내려가 메리트가 커진다.","partner":"A-bxn, A-scw"},"A-scw":{"identity":"소액 안전물건을 전국에서 찾아 기회 폭을 넓히는 발품형 수익률 추적자.","strength":"- 지역에 묶이지 않아 저평가 안전물건을 더 넓게 찾을 수 있다.\n- 권리 단순 물건 중심이라 낯선 지역에서도 권리 리스크는 통제된다.\n- 소액 다건으로 경험과 데이터를 빠르게 쌓을 수 있다.","weakness":"- 원격지 시세·출구·임차수요 파악이 어렵다.\n- 임장·명도·관리 비용이 마진을 잠식한다.\n- 낙찰은 쉬워도 원하는 가격에 팔거나 운영하는 출구가 약할 수 있다.","blindspot":"당신은 낙찰가와 시세의 차이만 보기 쉽지만, 낯선 지역의 진짜 리스크는 출구다. 그 지역에서 실제 매수자·임차인이 얼마나 있는지, 매각 소요기간이 얼마나 되는지 확인하지 않으면 원격 물건이 장기 재고가 될 수 있다.","market":"지역별 순환매가 도는 상승장에 강하다. 거래 위축기에는 원격 출구가 먼저 막힌다.","partner":"A-scn, A-bcw"},"A-sxn":{"identity":"소액으로 연고지 특수물건을 공략하는 도전자. 정보 우위는 있지만 자금 버퍼가 약하다.","strength":"- 연고지라 현장 정보와 시세 감각이 있다.\n- 특수물건이라 경쟁이 줄고 저가 낙찰 가능성이 있다.\n- 작은 자금으로 고마진 기회를 노릴 수 있다.","weakness":"- 특수물건은 소송·명도·합의금에 추가 자금과 시간이 필요하다.\n- 소액 자금과 고난도 물건은 구조적으로 충돌한다.\n- 분석 실패 시 자금이 장기간 묶일 수 있다.","blindspot":"연고지 정보 우위가 권리분석 역량을 대체하지 않는다. 유치권·지분·법정지상권은 해결 비용이 낙찰가보다 커질 수 있고, 소액 투자자는 그 예비비를 마련하지 못해 중도에 막히기 쉽다.","market":"시장 국면보다 개별 물건 해결 역량이 좌우한다.","partner":"A-bxn, A-scn"},"A-sxw":{"identity":"소액·특수·전국이 겹친 고위험 조합. 경매 초보라면 가장 먼저 범위를 줄여야 하는 유형.","strength":"- 이론상 전국 특수물건 풀에서 초저가 물건을 찾을 수 있다.\n- 성공하면 낙찰가 대비 마진이 클 수 있다.\n- 어려운 물건을 보는 감각은 빠르게 늘 수 있다.","weakness":"- 자금·난이도·거리 세 조건이 모두 불리하다.\n- 원격 특수물건은 임장·소송·명도 비용과 시간이 폭증한다.\n- 소액이라 문제 해결 예비비가 부족하다.","blindspot":"싸게 낙찰받으면 해결된다는 생각이 가장 위험하다. 특수물건은 빨리 안 풀리고, 원격이라 대응이 느리며, 소액이라 소송비가 부족하다. 이 성향이 나왔다면 자금 규모를 키우거나, 난이도를 낮추거나, 연고지로 좁히는 식으로 최소 한 축은 조정해야 한다.","market":"권장하기 어렵다. 전문 역량과 현지 네트워크가 전제다.","partner":"A-bxw, A-scn"},"A-bcn":{"identity":"큰 자본으로 연고지의 우량 안전물건을 공략하는 자산가형 안전입찰자.","strength":"- 자금 여력이 있어 우량물건을 안정적으로 공략할 수 있다.\n- 연고지라 시세·환금성·수요 판단이 정확하다.\n- 권리 단순 물건 위주라 큰 리스크를 피하면서 경매 메리트를 노린다.","weakness":"- 우량·안전·연고지 물건은 경쟁이 치열해 낙찰가율이 높다.\n- 큰 자본을 한 물건에 집중해 분산이 약하다.\n- 자금 여유가 오히려 고가낙찰을 부추길 수 있다.","blindspot":"자금력이 충분하다는 이유로 이 정도면 써도 된다고 판단하기 쉽다. 하지만 대액 집중에서는 한 번의 고가낙찰이 큰 손실이다. 경매로 싸게 샀다는 착각을 피하려면 일반 매매가와 총취득원가를 냉정히 비교해야 한다.","market":"하락장에서 강하다. 낙찰가율 하락과 현금 동원력이 동시에 장점이 된다.","partner":"A-bxn, A-scw"},"A-bcw":{"identity":"대액 안전물건을 전국에서 골라 운용하는 분산형 자산가.","strength":"- 전국 우량물건을 선별해 기회 풀을 넓힌다.\n- 권리 리스크가 낮고 자금 여력이 있어 실행력이 높다.\n- 여러 지역으로 포트폴리오를 분산할 수 있다.","weakness":"- 원격 관리·임장·출구 확인 부담이 크다.\n- 안전물건 위주라 수익률 한계가 있다.\n- 대액을 넓게 분산하면 관리 복잡성이 커진다.","blindspot":"전국 분산은 리스크 분산이기도 하지만 관리 역량 분산이기도 하다. 현지 관리 체계 없이 전국에 물건을 늘리면 공실·관리·매각 대응에서 수익이 새어나간다. 큰 자본일수록 전국 확장 전에 운영 시스템을 먼저 만들어야 한다.","market":"임대수요가 견고한 횡보·상승장에서 안정적이다. 거래 위축기에는 원격 출구가 약해진다.","partner":"A-bcn, A-bxw"},"A-bxn":{"identity":"큰 자본과 지역 정보를 바탕으로 연고지 특수물건을 해결하는 지역 기반 경매 고수.","strength":"- 자금 버퍼로 소송·명도·합의 비용을 감당할 수 있다.\n- 연고지라 시세·임차수요·매각 출구를 정확히 안다.\n- 권리분석 역량과 자본력으로 진입장벽 높은 물건을 공략한다.","weakness":"- 권리분석 한 번의 오판이 큰 손실로 이어진다.\n- 명도·소송이 길어지면 자본이 장기간 묶인다.\n- 실력 없이 흉내 내면 가장 위험한 영역이다.","blindspot":"특수물건의 변수는 법리보다 사람일 때가 많다. 유치권자·지분 공유자·점유자가 비합리적으로 버티면 협상은 교착되고 소송은 예상보다 길어진다. 최악의 해결 기간과 비용을 먼저 잡고도 수익이 나는지로 입찰가를 정해야 한다.","market":"국면 의존도가 낮다. 침체기에는 경쟁이 줄어 오히려 기회가 늘 수 있다.","partner":"A-bcn, A-bxw"},"A-bxw":{"identity":"큰 자본으로 전국의 특수물건을 추적하고 해결하는, 경매 트랙 최고 난도의 전업 전문가.","strength":"- 전국 고난도 물건에서 최고 마진을 노릴 수 있다.\n- 권리분석·소송·명도·협상을 시스템화하면 경쟁 없는 시장을 공략한다.\n- 자본력과 네트워크로 다른 입찰자가 못 들어가는 영역을 다룬다.","weakness":"- 권리분석 오판, 원격 명도 지연, 소송 장기화가 동시에 터지면 손실이 막대하다.\n- 전국 다건 분쟁 관리는 capacity 초과 위험이 크다.\n- 전업 수준의 법률·세무·현지 네트워크 없이는 불가능하다.","blindspot":"이 트랙의 정점에 있을수록 자신감이 가장 큰 리스크다. 과거 성공 패턴을 새 지역·새 법원·새 점유자에게 그대로 적용하면 변수 차이를 놓친다. 동시 진행 건수에 상한을 두고, 각 건의 최악 시나리오 자금을 따로 적립한 상태에서만 새 입찰에 들어가야 한다.","market":"국면 의존도는 낮고 실력이 곧 수익이다. 경쟁 적은 침체기에 기회가 확대될 수 있다.","partner":"A-bxn, A-bcw"}};
const GUIDES = {"M-SHRG":[{"label":"적합 물건","body":"역세권·학군·일자리 접근성 좋은 검증 입지의 국민평형(전용 59~84). 신축~준신축 선호. 본인 소득 대비 DSR 감당되는 가격대의 '갈아타기 사다리 중간 칸'."},{"label":"피해야 할 함정","body":"\"실거주니까 시세는 신경 안 써도 된다\"는 자기합리화. 대출 한도 끝까지 당겨 현금 버퍼 제로로 매수. 분양가·호가에 끌려 환금성 검증 생략."},{"label":"매수 전 체크리스트","body":"1. 금리 +2%p 스트레스 시에도 원리금이 가계 가처분의 일정선(통상 30~40%) 이내인가.\n2. 최근 3개월 실거래가·급매가 기준으로 호가 거품 여부 확인.\n3. 5년 내 갈아탈 상급지와의 현재 가격 갭, 그 갭이 벌어지는 추세인지.\n4. 학군·교통 등 '실거주 프리미엄'이 환금성으로도 연결되는 입지인가.\n5. 최소 6개월치 원리금 + 예비비 현금 버퍼 확보 여부."},{"label":"보유/매도 전략","body":"1주택 비과세(2년 보유, 조정지역은 2년 거주) 요건을 채워 매도. 갈아타기는 상급지 갭이 좁혀진 횡보·조정장을 노려라. 한 채 집중이므로 매도 타이밍이 곧 다음 사다리 칸을 결정 — 매년 상급지 갭을 점검하라."}],"M-SHRE":[{"label":"적합 물건","body":"무차입으로 매수 가능한 우량 입지의 실거주 한 채. 관리 편한 신축~준신축, 환금성 높은 평형."},{"label":"피해야 할 함정","body":"무차입 고집으로 우량 자산 상승분을 통째로 놓치는 '느린 손실'. 과도한 안전 추구로 합리적 갈아타기까지 회피. 현금을 비생산적으로 방치."},{"label":"매수 전 체크리스트","body":"1. 무차입 매수가 기회비용(같은 돈으로 적정 레버리지 시 추가 수익) 대비 합리적인가.\n2. 인플레이션 하에서 이 자산이 물가 상승률을 따라갈 우량 입지인가.\n3. 비상 현금은 남기되, 과도한 현금 방치(실질 구매력 손실)는 아닌가."},{"label":"보유/매도 전략","body":"장기 보유가 기본. 하락·고금리장에 현금 동원력으로 우량 급매를 줍는 역발상 매수를 준비. 갈아타기가 합리적인 국면에선 '적정' 레버리지를 거부하지 말 것."}],"M-SHPG":[{"label":"적합 물건","body":"전세가율 높고 전세수요 탄탄한 검증 입지(직주근접·학군). 갭(매매가-전세가)이 작고, 입주 물량 리스크 적은 지역."},{"label":"피해야 할 함정","body":"\"우량지니 전세는 늘 나간다\" 가정. 입주 폭탄·금리 급등기 역전세 무대비. 다주택 확장 중 취득세·종부세·양도세 중과 간과. 무주택자가 본인 실거주를 무한정 미룸."},{"label":"매수 전 체크리스트","body":"1. 향후 2~3년 해당 권역 입주(공급) 물량 — 역전세 가능성 점검.\n2. 전세가 10~20% 하락 시 반환 가능한 현금 버퍼 보유 여부.\n3. 전세 만기 캘린더와 재계약 시나리오.\n4. (다주택 진입 시) 취득세 중과·종부세 합산·양도세 중과 시뮬레이션.\n5. (무주택) 청약·실거주 비과세 기회를 포기할 만한 수익 우위가 있는가."},{"label":"보유/매도 전략","body":"장기 보유로 시세 상승 향유하되, 전세 만기마다 역전세 점검은 필수. 매도는 보유 2년+ 비과세/일반세율 구간에서. 역전세 국면이 닥치면 보증금 일부 반환을 위한 추가 대출 한도를 미리 확보."}],"M-SHPE":[{"label":"적합 물건","body":"자기자본으로 확보 가능한 우량 입지 물건. 현금흐름·환금성 안정적인 검증 자산."},{"label":"피해야 할 함정","body":"분석마비(검토만 하다 실행 못 함). 무차입 고집에 따른 자본 비효율로 장기 누적 수익 격차. 좋은 기회 앞에서도 매수 지연."},{"label":"매수 전 체크리스트","body":"1. 분석을 끝냈으면 정한 기준 충족 시 '실행'할 트리거를 미리 정했는가.\n2. 무차입의 안정 vs 적정 레버리지의 수익, 둘을 정량 비교했는가.\n3. 매수 지연으로 놓친 직전 기회들을 복기했는가."},{"label":"보유/매도 전략","body":"장기 보유·복리가 강점. 하락장 현금 동원으로 우량 급매 매수. 단, 좋은 물건엔 적정 레버리지를 검토해 실행 속도를 높여라."}],"M-STRG":[{"label":"적합 물건","body":"비과세 요건 채우기 좋은 검증 입지 실거주 물건, 상급지 환승 사다리."},{"label":"피해야 할 함정","body":"환승 거래비용(취득세·중개·이사) 누적, 처분기한 압박, 상급지가 더 빨리 올라 격차 확대."},{"label":"매수 전 체크리스트","body":"1) 일시적 2주택 비과세 처분기한·요건 확인 2) 매도·매수 동시 진행 자금 갭 3) 상급지와의 가격 격차 추세."},{"label":"보유/매도 전략","body":"비과세 타이밍에 환승, 상급지 갭이 좁아진 조정장을 노려라."}],"M-STRE":[{"label":"적합 물건","body":"무리 없는 자금의 검증 입지 실거주 물건."},{"label":"피해야 할 함정","body":"무한 연기로 상급지 격차 복리 확대, 과도한 신중함."},{"label":"매수 전 체크리스트","body":"1) 환승 미루는 동안의 기회비용 2) 무차입 제약으로 진입 못 하는 상급지 여부 3) 자금계획 보수성 점검."},{"label":"보유/매도 전략","body":"보수적 환승. 단, '준비되면'을 핑계로 한 무한 연기는 경계."}],"M-STPG":[{"label":"적합 물건","body":"환금성 높은 검증 물건, 단기 매각 수요 탄탄한 입지."},{"label":"피해야 할 함정","body":"단기 양도세(2년 미만 중과) 과소평가, 거래비용 누적, 안전물건의 박한 마진."},{"label":"매수 전 체크리스트","body":"1) 보유기간별 양도세율 적용한 세후 수익 2) 매각 출구 수요 검증 3) 전세 레버리지 역전세 리스크."},{"label":"보유/매도 전략","body":"세후 수익이 충분치 않으면 2년 보유로 전환해 일반세율/비과세 활용."}],"M-STPE":[{"label":"적합 물건","body":"무차입 가능한 안전 물건(단, 정체성 재점검 권장)."},{"label":"피해야 할 함정","body":"안전+단기차익의 본질적 상충 — 어느 쪽도 못 챙김. 자본 비효율."},{"label":"매수 전 체크리스트","body":"1) 세후 단기차익이 정말 남는가 2) 장기보유/레버리지 중 어느 정체성이 본인에 맞는가."},{"label":"보유/매도 전략","body":"단타 매력이 약하면 장기보유로 전환 검토."}],"M-AHRG":[{"label":"적합 물건","body":"정비사업·교통 개발 기대가 있는 실거주 가능 지역. 사업 단계가 가시화된 곳."},{"label":"피해야 할 함정","body":"거주지에 대한 감정 이입으로 호재 실현 확률·시점 낙관, 정비사업 장기화 중 생활 불편, 레버리지+불확실성 이중 부담."},{"label":"매수 전 체크리스트","body":"1) 정비사업 단계(조합설립/사업시행/관리처분)와 예상 기간 2) 호재 무산 시에도 거주 만족도가 유지되는가 3) 사업 지연 중 원리금 감당력."},{"label":"보유/매도 전략","body":"실거주 만족과 투자 기대를 분리. 호재 실현 단계마다 보유/매도 재판단."}],"M-AHRE":[{"label":"적합 물건","body":"저평가 실거주지, 무차입 매수 가능 가격대."},{"label":"피해야 할 함정","body":"무한 인내(호재가 안 올 수도), 자본 묶임, 다른 우량지 선상승 소외."},{"label":"매수 전 체크리스트","body":"1) 저평가를 해소할 카탈리스트 존재 2) 버티는 기간의 기회비용 3) 무차입 제약 점검."},{"label":"보유/매도 전략","body":"카탈리스트 점검하며 장기 보유. 촉매 없으면 출구 재검토."}],"M-AHPG":[{"label":"적합 물건","body":"사업성 검증된 정비사업 구역(재건축·재개발), 단계별로 리스크-수익 프로파일이 다름 — 본인 리스크 수용도에 맞는 단계 선택. 전세·대출 레버리지 가능 가격대."},{"label":"피해야 할 함정","body":"상승 시나리오만 정교하게 그리고 시간비용·무산리스크 할인. '호재'를 단계 구분 없이 뭉뚱그림. 분담금 추가 납입 무대비. 사업단계 중 환금성 제로 간과."},{"label":"매수 전 체크리스트","body":"1. 사업 단계 확인: 구역지정 → 조합설립인가 → 사업시행인가 → 관리처분인가. 빠른 단계일수록 수익↑·무산 확률↑.\n2. 추정 분담금과 추가 분담금 발생 시 감당 가능 현금.\n3. 조합 내분·소송 이력, 비대위 유무 등 사업 추진 안정성.\n4. 같은 자금을 검증 우량지에 넣었을 때의 기회비용 대비 기대수익.\n5. 사업 기간(평균 10년+) 동안 자금 동결을 감당할 수 있는가."},{"label":"보유/매도 전략","body":"단계 진행에 따라 가치가 점프(인가 시점마다 상승)하므로, 인가 이벤트 전 매집·후 차익 실현 전략 가능. 무산 시그널(조합 해산·장기 정체) 포착 시 손절 기준을 미리 정하라. 다주택 진입 시 정비사업 조합원 양도 제한·세금 확인."}],"M-AHPE":[{"label":"적합 물건","body":"카탈리스트 있는 저평가 물건, 무차입 매수 가능 가격대."},{"label":"피해야 할 함정","body":"\"싸니까 안전\" — 싼 이유 간과, 촉매 없는 영구 저평가, 자본 묶임."},{"label":"매수 전 체크리스트","body":"1) 가격을 올릴 구체적 촉매 2) 저평가 지속 시 버티는 기간 3) 무차입 기회비용."},{"label":"보유/매도 전략","body":"촉매 실현 시 매도. 촉매 부재면 진입 자체를 보류."}],"M-ATRG":[{"label":"적합 물건","body":"호재 지역의 실거주 환승 대상, 빠른 상승 흐름 물건."},{"label":"피해야 할 함정","body":"실거주 명분 뒤의 고위험 단타, 거래비용+단기 양도세, 타이밍 실패 시 큰 손실."},{"label":"매수 전 체크리스트","body":"1) 환승 시 시장·세금·자금 동시 정렬 여부 2) 단기 양도세 세후 수익 3) 타이밍 역행 시 버티기 시나리오."},{"label":"보유/매도 전략","body":"강한 상승장 한정. 한 박자 어긋나면 보수 모드로 전환."}],"M-ATRE":[{"label":"적합 물건","body":"무차입 가능한 공격 실거주 환승 물건(정체성 재점검 권장)."},{"label":"피해야 할 함정","body":"현금 동원력 과신으로 변동성 경시, 단타 양도세, 자본 비효율."},{"label":"매수 전 체크리스트","body":"1) 무차입인데 굳이 단기 공격하는 이유 2) 세후 수익 3) 본인 성향 재확인."},{"label":"보유/매도 전략","body":"변동성 큰 상승장 한정. 장기보유 전환도 검토."}],"M-ATPG":[{"label":"적합 물건","body":"저평가·호재 물건 중 단기 모멘텀이 강한 것. 전세·대출 풀레버리지 가능 + 환금성(거래 활발) 검증된 물건. 거래량 받쳐주는 상승장 한정."},{"label":"피해야 할 함정","body":"몇 번 성공 후 '시장을 읽는다'는 과신. 환금성 함정(팔아야 할 때 못 팖)에서 풀레버리지가 마진콜로 돌변. 세전 수익에 취해 단기 양도세 무시."},{"label":"매수 전 체크리스트","body":"1. 청산(매도) 시나리오: 누구에게, 얼마에, 며칠 안에 파는가 — 출구가 먼저다.\n2. 거래가 멈춰 '못 팔았을 때'의 자금/이자 시나리오(강제 장기보유 대비).\n3. 단기 양도세율 적용한 세후 수익 — 세전 수익은 의미 없다.\n4. 금리·역전세 동시 충격 시 레버리지 감당 한계.\n5. 풀레버리지 비중 상한선을 본인 자본 대비 못 박았는가."},{"label":"보유/매도 전략","body":"진입 시 청산 조건(목표가·손절가·기한)을 동시에 확정. 거래량·심리 둔화 시그널에 즉시 청산. 세후로만 성과 측정. 한 사이클 실패가 다음 사이클을 막지 않도록 레버리지에 상한을 둘 것."}],"M-ATPE":[{"label":"적합 물건","body":"무차입 가능 저평가 물건(정체성 재점검 권장)."},{"label":"피해야 할 함정","body":"무차입=안전 착각(진짜 비용은 세금·타이밍), 자본 비효율."},{"label":"매수 전 체크리스트","body":"1) 세후 단기차익 2) 무차입으로 수익 잠재력 깎는 게 맞는가 3) 장기보유/레버리지 회전 중 정체성 확정."},{"label":"보유/매도 전략","body":"정체성을 M-AHPE(장기) 또는 M-ATPG(레버리지 회전)로 명확히.\n\n---\n\n# 경매(競賣) 트랙 활용 가이드\n\n> **개인화 경고 공통 골격** (모든 경매 유형에 적용, 유형별로 강조점 다름):\n> - **주택보유상황** — 다주택: 낙찰도 취득이므로 취득세 중과(조정지역 2주택~ 8~12%)·종부세 합산·단기 매각 시 양도세 중과. / 1주택: 일시적 2주택 비과세 처분기한 활용. / 무주택: 실거주 의무·대출 우대(생애최초·디딤돌)·청약 기회와 저울질.\n> - **경매경험** — 초보: 특수물건(유치권·지분·법정지상권) 금지에 가깝게, 고가낙찰(경쟁에 휩쓸려 시세 이상 입찰) 경고. / 중급: 권리분석 1~2개 쟁점 물건까지. / 숙련: 특수물건 도전 가능."}],"A-scn":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 권리 단순 물건. 안전입찰 위주로 권리분석 난이도를 낮게 유지한다."},{"label":"명도 리스크 수용","body":"낮게. 인도명령 가능 물건과 대항력 없는 점유 위주로 한정."},{"label":"입찰 전 체크리스트","body":"1. 등기부·매각물건명세서·현황조사서 3종 확인.\n2. 최근 실거래·급매가 기준 입찰 상한선 산정.\n3. 점유자 현황과 인도명령 가능성 확인.\n4. 명도비·체납관리비 등 총취득원가 반영."},{"label":"개인화 경고","body":"초보에게 가장 무난하지만 고가낙찰 위험이 크다. 안전물건일수록 경쟁이 심하므로 패찰을 두려워하지 말 것."}],"A-scw":[{"label":"적합 물건 · 권리분석 난이도","body":"전국의 권리 단순 안전물건. 지역을 넓히되 출구와 관리 가능성을 우선 확인한다."},{"label":"명도 리스크 수용","body":"낮~중간. 권리는 단순해도 원격 명도·관리 대응력이 필요하다."},{"label":"입찰 전 체크리스트","body":"1. 지역별 실거래·매각 소요기간 확인.\n2. 현지 임장 또는 현지 중개 네트워크 확보.\n3. 원정 비용과 관리비를 수익률에 반영.\n4. 동시 진행 건수 제한."},{"label":"개인화 경고","body":"전국 기회 탐색은 좋지만 모르는 지역의 싼 물건은 싼 이유가 있을 수 있다. 출구 검증이 핵심."}],"A-sxn":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 특수물건. 지역 정보 우위를 활용하되 법률 리스크를 과소평가하지 않는다."},{"label":"명도 리스크 수용","body":"중~높음. 유치권·지분·법정지상권 등은 협상·소송 장기화 가능성이 있다."},{"label":"입찰 전 체크리스트","body":"1. 특수권리의 성립 요건과 반박 가능성 확인.\n2. 해결 비용·기간을 최악 기준으로 산정.\n3. 소송비·명도비 예비비 확보.\n4. 전문가 검토 후 입찰 상한선 결정."},{"label":"개인화 경고","body":"소액으로 특수물건을 다루면 예비비 부족이 가장 큰 리스크다. 연고지 정보가 권리분석 실력을 대체하지 않는다."}],"A-sxw":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 특수물건. 소액·원정·특수의 삼중 부담이 있어 원칙적으로 권장하지 않는다."},{"label":"명도 리스크 수용","body":"매우 높음. 원격 소송·명도·현장 대응이 모두 필요하다."},{"label":"입찰 전 체크리스트","body":"1. 최소 한 축 조정: 자금 확대, 난이도 완화, 지역 축소 중 하나.\n2. 현지 파트너 없으면 입찰 보류.\n3. 해결비용이 낙찰가를 넘는 시나리오 점검.\n4. 첫 경매라면 안전물건부터 경험 축적."},{"label":"개인화 경고","body":"가장 강한 경고 대상. 싸게 낙찰받으면 된다는 생각이 손실로 이어지기 쉽다."}],"A-bcn":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 우량 안전물건. 큰 자본을 쓰는 만큼 고가낙찰 방지가 핵심이다."},{"label":"명도 리스크 수용","body":"낮음. 다만 대액 물건은 명도·세금·자금 일정이 커진다."},{"label":"입찰 전 체크리스트","body":"1. 일반 매매가와 총취득원가 비교.\n2. 입찰 상한선 사전 고정.\n3. 권리 단순성 확인.\n4. 대액 집중 리스크와 유동성 점검."},{"label":"개인화 경고","body":"자금 여유가 고가낙찰을 부른다. 좋은 물건일수록 사람도 몰린다."}],"A-bcw":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 우량 안전물건. 자본력은 있지만 운영 시스템이 없으면 분산이 부담이 된다."},{"label":"명도 리스크 수용","body":"낮~중간. 권리보다는 원격 관리·매각 대응이 핵심."},{"label":"입찰 전 체크리스트","body":"1. 지역별 관리 네트워크 확보.\n2. 공실·관리 비용 반영.\n3. 지역별 매각 소요기간 확인.\n4. 포트폴리오 지역 수 제한."},{"label":"개인화 경고","body":"전국 분산은 관리 역량도 분산시킨다. 큰 자본일수록 운영 시스템이 먼저다."}],"A-bxn":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 특수물건. 자본·지역 정보·권리분석 역량을 모두 쓰는 고수 영역."},{"label":"명도 리스크 수용","body":"높음. 소송·협상·명도 기간과 비용을 감당할 자금 버퍼 필요."},{"label":"입찰 전 체크리스트","body":"1. 특수권리 법리와 사실관계 분리 검토.\n2. 상대방 협상 가능성 확인.\n3. 최악 기간·비용 기준 수익성 재계산.\n4. 동시 진행 건수 제한."},{"label":"개인화 경고","body":"자본력이 문제를 다 해결해주진 않는다. 특수물건의 변수는 법리보다 사람일 때가 많다."}],"A-bxw":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 특수물건. 전업 수준의 법률·세무·현지 네트워크가 필요한 최고 난도."},{"label":"명도 리스크 수용","body":"매우 높음. 전국 원정, 소송, 명도, 매각을 시스템으로 처리해야 한다."},{"label":"입찰 전 체크리스트","body":"1. 지역별 법원 운영·현장 관행 확인.\n2. 현지 전문가·중개·명도 네트워크 확보.\n3. 각 건별 최악 시나리오 자금 적립.\n4. 다건 동시 진행 상한 설정."},{"label":"개인화 경고","body":"실력이 곧 수익인 영역이지만 자신감이 가장 큰 리스크다. 과거 성공 패턴을 모든 지역에 그대로 적용하지 말 것."}]};
const SCORE_FN = function scoreTrack(data, answers, profileAnswers) {
  var tally = {};
  function add(scoreObj) {
    if (!scoreObj) return;
    for (var k in scoreObj) tally[k] = (tally[k] || 0) + scoreObj[k];
  }
  // general questions
  for (var i = 0; i < data.questions.length; i++) {
    var q = data.questions[i];
    var opt = answers[q.id];
    if (opt) add(opt.score);
  }
  // profile inputs (axis-bearing add score; all store value)
  var profileValues = {};
  var pin = data.profile_inputs || [];
  for (var j = 0; j < pin.length; j++) {
    var inp = pin[j];
    var sel = profileAnswers ? profileAnswers[inp.id] : null;
    if (sel) {
      profileValues[inp.id] = sel.value;
      if (sel.score) add(sel.score);
    }
  }
  // resolve poles per axis_order
  var poles = {};
  var borderline = [];
  for (var a = 0; a < data.axis_order.length; a++) {
    var axisId = data.axis_order[a];
    var ax = null;
    for (var z = 0; z < data.axes.length; z++) if (data.axes[z].id === axisId) ax = data.axes[z];
    var sa = tally[ax.pole_a.code] || 0;
    var sb = tally[ax.pole_b.code] || 0;
    if (sa > sb) poles[axisId] = ax.pole_a.code;
    else if (sb > sa) poles[axisId] = ax.pole_b.code;
    else { poles[axisId] = ax.default_pole; borderline.push(axisId); }
  }
  // assemble code
  var code = data.code_prefix;
  for (var b = 0; b < data.axis_order.length; b++) code += poles[data.axis_order[b]];
  // flags
  var flags = [];
  var rules = data.flags || [];
  for (var r = 0; r < rules.length; r++) {
    var rule = rules[r], when = rule.when, ok = true;
    for (var key in when) {
      var want = when[key], got;
      if (key.indexOf('axis_') === 0) got = poles[key.slice(5)];
      else if (key === 'type_code') got = code;
      else got = profileValues[key];
      if (got !== want) { ok = false; break; }
    }
    if (ok) flags.push({ level: rule.level, message: rule.message });
  }
  var lvOrder = { danger: 0, warn: 1, info: 2 };
  flags.sort(function (x, y) { return lvOrder[x.level] - lvOrder[y.level]; });
  return { code: code, poles: poles, borderline: borderline, flags: flags, profileValues: profileValues, tally: tally };
};
const scoreTrack = SCORE_FN;

/* ---------- mini markdown formatter ---------- */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineFmt(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }
function fmt(raw){
  if(!raw) return '';
  // split inline enumerations "1) .. 2) .." into separate lines
  let lines = raw.split('\n');
  let expanded = [];
  for(let line of lines){
    let trimmed = line.trim();
    let parens = (trimmed.match(/\d+\)\s/g)||[]).length;
    if(parens>=2 && trimmed.indexOf('- ')!==0){
      trimmed.split(/\s*(?=\d+\)\s)/).forEach(p=>{ if(p.trim()) expanded.push(p.trim()); });
    } else if(trimmed) expanded.push(trimmed);
  }
  let html='', i=0;
  while(i<expanded.length){
    let l=expanded[i];
    if(/^-\s/.test(l)){
      html+='<ul>';
      while(i<expanded.length && /^-\s/.test(expanded[i])){ html+='<li>'+inlineFmt(expanded[i].replace(/^-\s/,''))+'</li>'; i++; }
      html+='</ul>';
    } else if(/^\d+[\.\)]\s/.test(l)){
      html+='<ol>';
      while(i<expanded.length && /^\d+[\.\)]\s/.test(expanded[i])){ html+='<li>'+inlineFmt(expanded[i].replace(/^\d+[\.\)]\s/,''))+'</li>'; i++; }
      html+='</ol>';
    } else { html+='<p>'+inlineFmt(l)+'</p>'; i++; }
  }
  return html;
}

/* ---------- quiz ---------- */
function beginQuiz(){
  const data=DATA[state.track];
  let steps=[];
  // v1.1: 매매·경매 양 트랙 모두 profile_inputs(주택보유·규제지역 등)를 먼저 입력
  (data.profile_inputs||[]).forEach(p=>steps.push({kind:'profile',item:p}));
  data.questions.forEach(q=>steps.push({kind:'question',item:q}));
  state.steps=steps; state.stepIndex=0; state.answers={}; state.profile={};
  show('screen-quiz'); renderStep();
}
function renderStep(){
  const data=DATA[state.track];
  const step=state.steps[state.stepIndex];
  const total=state.steps.length;
  $('q-track').textContent=data.track_label;
  $('q-count').textContent=(state.stepIndex+1)+' / '+total;
  $('q-bar').style.width=(((state.stepIndex)/(total))*100)+'%';
  const body=$('q-body');
  const it=step.item;
  const isProfile=step.kind==='profile';
  const selected = isProfile ? state.profile[it.id] : state.answers[it.id];
  let h='<div class="qkind"><span class="dot'+(isProfile?' profile':'')+'"></span><span>'+
        (isProfile?('개인화 입력 · '+it.label):('성향 문항 · '+axisLabel(data,it.axis)))+'</span></div>';
  h+='<div class="qtext">'+esc(it.text)+'</div>';
  if(isProfile) h+='<div class="qsub">투자 조건을 알려주시면 결과에 세금·리스크 경고를 더해 드려요.</div>';
  h+='<div class="opts">';
  it.options.forEach((o,idx)=>{
    const sel = selected && selected.__i===idx;
    h+='<button class="opt'+(sel?' sel':'')+'" data-idx="'+idx+'"><span class="mark"></span><span>'+esc(o.label)+'</span></button>';
  });
  h+='</div>';
  body.innerHTML=h;
  body.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick=()=>{
      const idx=+btn.dataset.idx;
      const opt=Object.assign({__i:idx}, it.options[idx]);
      if(isProfile) state.profile[it.id]=opt; else state.answers[it.id]=opt;
      body.querySelectorAll('.opt').forEach(b=>{ b.classList.remove('sel'); b.style.pointerEvents='none'; });
      btn.classList.add('sel');
      $('next-btn').disabled=false;
      clearTimeout(state._advTimer);
      state._advTimer=setTimeout(advanceStep, 260);
    };
  });
  $('prev-btn').style.visibility = state.stepIndex===0 ? 'hidden':'visible';
  const isLast = state.stepIndex===total-1;
  $('next-btn').textContent = isLast ? '결과 보기 ✦' : '다음 →';
  $('next-btn').disabled = !selected;
}
function axisLabel(data,axisId){ const a=data.axes.find(x=>x.id===axisId); return a?a.label:axisId; }
function advanceStep(){
  clearTimeout(state._advTimer);
  if(state.stepIndex<state.steps.length-1){ state.stepIndex++; renderStep(); $('q-bar').style.width=((state.stepIndex/state.steps.length)*100)+'%'; }
  else finishQuiz();
}
$('prev-btn').onclick=()=>{ clearTimeout(state._advTimer); if(state.stepIndex>0){ state.stepIndex--; renderStep(); $('q-bar').style.width=((state.stepIndex/state.steps.length)*100)+'%'; } };
$('next-btn').onclick=advanceStep;
function finishQuiz(){
  const data=DATA[state.track];
  const profileAns={};
  for(const k in state.profile) profileAns[k]=state.profile[k];
  const r=scoreTrack(data, state.answers, profileAns);
  renderResult(state.track, r);
  saveToURL(state.track, r);
  show('screen-result');
}

    if(track==='gyeongmae' && r.profileValues && r.profileValues.region_regulated==='regulated'){

    }
    r.flags.forEach(f=>{
      const ico=f.level==='danger'?'🚨':(f.level==='warn'?'⚠️':'ℹ️');
      const lab=f.level==='danger'?'강경고':(f.level==='warn'?'주의':'안내');
      h+='<div class="flag '+f.level+'"><span class="fi">'+ico+'</span><div><span class="ft">'+lab+'</span><div class="fm">'+esc(f.message)+'</div></div></div>';
    });
    h+='<p class="flag-foot">※ 위 규제 경고의 수치는 <code>00_regulations.md</code>(2026-07-01 기준) 근거이며, <b>[불확실-확인필요]</b> 항목은 시점·금융기관·관보 원문으로 직접 재확인이 필요합니다. 본 도구는 안내일 뿐 세무·법률 자문이 아닙니다.</p>';
    h+='</div>';
    // 규제 요약 체크리스트(R-0~R-4) 접이식 노출
    h+=REG_SUMMARY;
  }

  // guide
  if(g.length){
    h+='<div class="sec"><div class="sec-title">'+(track==='maemae'?'매매 활용 가이드':'경매 활용 가이드')+'</div>';
    g.forEach(item=>{ h+='<div class="guide-item"><h4>'+esc(item.label)+'</h4>'+fmt(item.body)+'</div>'; });
    h+='</div>';
  }

  // 추천 경매 검색조건 카드 (경매 트랙 전용)
  if(track==='gyeongmae'){
    h+='<div class="sec"><div class="sec-title">추천 경매 검색조건 · courtauction 필터</div>'+searchCardShell()+'</div>';
  }

  // actions
  h+='<div class="btn-row" style="margin-top:34px;">'+
     '<button class="btn btn-primary" id="restart-btn">↻ 다시하기</button>'+
     '<button class="btn btn-ghost" id="save-btn">🔗 결과 저장·공유</button>'+
     '<button class="btn btn-ghost" id="print-btn">🖨 인쇄</button>'+
     '</div>';
  h+='<p class="disclaimer">이 진단은 투자 권유가 아니라 본인의 성향을 비추는 거울입니다. 실제 매수·입찰 전에는 세무사·전문가 상담과 개별 물건 검증을 반드시 거치세요. 세율·규제는 시점에 따라 달라질 수 있습니다.</p>';
  h+='<footer>부동산 투자성향 MBTI · 매매 16유형 + 경매 16유형 · 본인 판단용</footer>';

  $('result-body').innerHTML=h;
  $('progress').style.width='100%';
  $('restart-btn').onclick=restart;
  $('save-btn').onclick=()=>{ copyShare(); };
  $('print-btn').onclick=()=>window.print();

/* ============================================================
   추천 경매 검색조건 — 04_search_criteria.json (v1.0) 규칙의 JS 재현
   검색조건 = f(유형 축, profile 입력값). 결정적 매핑.
   ============================================================ */
function scFmtKRW(won){
  if(won==null) return '하한 없음';
  var eok=Math.floor(won/100000000);
  var man=Math.round((won%100000000)/10000);
  var s='';
  if(eok>0) s+=eok+'억';
  if(man>0) s+=(eok>0?' ':'')+man.toLocaleString()+'만';
  if(!s) s='0';
  return s+'원';
}
var SC_SIDO=['','서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시','세종특별자치시','경기도','강원특별자치도','충청북도','충청남도','전북특별자치도','전라남도','경상북도','경상남도','제주특별자치도'];

function computeSearchCriteria(r, sido, sigungu){
  var poles=r.poles||{}, pv=r.profileValues||{};
  var fund=pv.fund_size, own=pv.ownership||'none', reg=pv.region_regulated||'normal';
  var purpose=pv.purpose, exp=pv.experience, pref=pv.region_pref;
  var FUND=poles.FUND, DIFF=poles.DIFFICULTY, REGION=poles.REGION, PURP=poles.PURPOSE;
  var isFlip=(PURP==='f')||(purpose==='flip');
  var isSmall=fund?(fund==='u50'||fund==='u150'):(FUND==='s');
  var isBig=fund?(fund==='u300'||fund==='o300'):(FUND==='b');

  // --- price: equity_top × LTV배수 × 보수계수 (00_regulations.md 근거) ---
  var EQ={u50:50000000,u150:150000000,u300:300000000,o300:400000000};
  var equity=(fund&&EQ[fund]!=null)?EQ[fund]:(FUND==='b'?300000000:50000000);
  function ltvMult(regKey){ // 1/(1-LTV)
    if(regKey==='regulated') return (own==='none')?1.67:1.0; // 무주택 LTV40 / 1주택·다주택 LTV0
    return 3.33; // 비규제 LTV70
  }
  var fundSafety=(FUND==='b')?1.0:0.9;
  var multiNormalSafety=(own==='multi'&&reg==='normal')?0.7:1.0;
  function pmax(regKey){ return Math.round(equity*ltvMult(regKey)*fundSafety*multiNormalSafety/1000000)*1000000; }
  var priceMax, priceMaxAlt=null, priceMaxAltLabel='';
  if(reg==='unknown'){
    var low=pmax('regulated'), high=pmax('normal');
    priceMax=high; priceMaxAlt=low; priceMaxAltLabel='규제지역이면 보수적으로 '+scFmtKRW(low)+'까지 낮춰 산정';
  } else {
    priceMax=pmax(reg);
    if(reg==='regulated'&&own==='none'){ // 생애최초 LTV70 분기
      priceMaxAlt=Math.round(equity*3.33*fundSafety/1000000)*1000000;
      priceMaxAltLabel='생애최초 LTV 70% 인정 시 ~'+scFmtKRW(priceMaxAlt)+'까지 확대 가능';
    }
  }
  var priceMin=isSmall?30000000:null;

  // --- property_type: base_by_purpose → fund_modifier ---
  var base=(purpose==='rent')?['아파트','오피스텔','다세대주택']:(purpose==='flip')?['아파트','오피스텔']:['아파트'];
  var ptypes;
  if(isBig){ ptypes=['아파트']; if(purpose==='rent') ptypes.push('오피스텔'); }
  else { ptypes=base.slice(); if(isSmall) ['다세대주택','연립주택','오피스텔','도시형생활주택'].forEach(function(t){ if(ptypes.indexOf(t)<0) ptypes.push(t); }); }

  // --- regulated_preference ---
  var regPref;
  if(own==='multi') regPref='비규제선호(강)';
  else if(own==='one') regPref='비규제권장';
  else regPref=(purpose==='flip')?'비규제선호':(purpose==='rent')?'규제무관~비규제선호':'규제무관(실수요면 규제지역도 적합·기회)';

  // --- min_fail_count ---
  var mf=(DIFF==='x')?2:1;
  if(isFlip) mf+=1;
  if(reg==='regulated') mf+=1;
  if(FUND==='b'&&DIFF==='c') mf-=1;
  if(mf<0) mf=0;

  // --- rights_difficulty (experience override) ---
  var rights=(DIFF==='x')?'special_ok':'safe', rightsNote='', specialConds=[];
  if(rights==='safe'){ rightsNote='말소기준권리 이하 전부 소멸·인수권리 0·대항력 없는 점유(인도명령 가능). 특수조건 미체크.'; }
  else {
    specialConds=['유치권','법정지상권','분묘기지권','지분매각','대지권미등기','선순위(대항력)임차인'];
    rightsNote='유치권·법정지상권·지분·선순위임차인 등 허용. courtauction 특수조건 체크.';
    if(exp==='novice'){ rights='safe'; specialConds=[]; rightsNote='⚠ 초보+특수물건은 위험 → 안전(safe)으로 강등 권고. 첫 5건은 권리 단순 물건으로. (원 성향: special_ok)'; }
    else if(exp==='inter'){ rightsNote='쟁점 1~2개 물건까지 제한 권고. '+rightsNote; }
  }

  // --- area_pyeong ---
  var area, areaMin=null, areaMax=null;
  if(purpose==='rent'){ area='소형 임대형(전용 ~59㎡)·오피스텔'; areaMax=59; }
  else if(isSmall){ area='전용 ~59㎡ 소형'; areaMax=59; }
  else { area='국민평형(전용 59~84㎡)'; areaMin=59; areaMax=84; }

  // --- region ---
  var rscope, rsite, raxis;
  if(pref==='nation'){ rscope='전국 (수익률 상위 복수 시·군·구 순회)'; rsite='시도 무제한'; raxis=(REGION==='w')?'w':'n'; }
  else if(pref==='metro'){ rscope='수도권 (서울·경기·인천)'; rsite='시도=서울/경기/인천'; raxis='w(약)'; }
  else { rscope='연고 시·군·구 1~2곳'; rsite='시도+시군구 직접 지정'; raxis='n'; }
  var regionStr;
  if(sido&&sigungu) regionStr=sido+' '+sigungu;
  else if(sido) regionStr=sido+' (시·군·구 미지정)';
  else regionStr=rscope;
  var regSuffix='';
  if(own==='multi'||own==='one') regSuffix=' · 비규제 지역 우선';
  else if(isSmall&&reg!=='regulated') regSuffix=' · 자금 고려 시 비규제 현실적';

  // --- notes (flags 메시지 골격 + price/세금/명도/면책) ---
  var notes=[];
  if(reg==='regulated'&&own==='none') notes.push('규제지역 무주택 경락대출 LTV 40%(×1.67)·6개월 전입의무 전제로 산정. 생애최초면 LTV 70%(×3.33)로 '+scFmtKRW(priceMaxAlt)+'까지 확대 가능 — 대출 조건과 실거주 요건은 분리해 확인.');
  else if(reg==='regulated'&&(own==='one'||own==='multi')) notes.push('규제지역 '+(own==='multi'?'다주택':'1주택 미처분 추가구입')+'은 경락잔금대출에도 주담대 금지(LTV 0%)가 적용될 수 있어 전액 자기자본 전제로 입찰가를 산정했습니다. (금융사별 경락대출 취급기준 확인 필요)');
  else if(reg==='unknown') notes.push('규제 여부 미상 → price_max를 규제(보수 '+scFmtKRW(priceMaxAlt)+')~비규제(확대 '+scFmtKRW(priceMax)+') 범위로 제시. 입찰 전 국토부 「조정대상지역·투기과열지구 지정」 페이지에서 규제 여부를 먼저 확인하세요.');
  else notes.push('비규제 LTV 70%(×3.33) 가정. price_max는 대출 최대·DSR 40% 충족 가정의 검색 상한이며, 경락잔금대출 가용액은 금융사·소득별로 상이하니 보수적으로 잡고 DSR을 확인하세요.');
  if(own==='multi'&&reg==='normal') notes.push('비규제라도 다주택은 수도권 주담대 6억 한도·추가구입 제약·DSR 불확실로 ×0.7 추가 보수를 적용했습니다.');
  if(reg==='regulated') notes.push('규제지역 경매의 양면 — (기회) 토지거래허가 2년 실거주의무·자금조달계획서 면제 / (함정) 그 쏠림으로 고가낙찰 빈발 + 대출규제(LTV·DSR)는 동일. price_max는 검색 상한일 뿐, 낙찰가는 시세 역산 상한을 절대 넘기지 마세요.');
  if(own==='multi'&&isFlip) notes.push('다주택 단기매각: 양도세 단기중과(1년 미만 70%·2년 미만 60% 등) + 조정지역 +20~30%p 중과(유예 종료 여부 확인) + 취득세 8~12% 중과 → 세후 마진이 거의 없을 수 있으니 세후 취득원가로 재계산.');
  else if(own==='multi') notes.push('다주택 추가취득: 취득세 8~12% 중과 + 종부세 합산 → "싸게 낙찰"의 메리트가 상쇄될 수 있으니 세후 취득원가로 재계산.');
  else if(own==='none'&&purpose==='reside') notes.push('무주택 실거주: 생애최초 취득세 감면·디딤돌/보금자리 대출 우대 대상일 수 있습니다.');
  if(rights==='special_ok') notes.push('특수물건은 명도·소송 예비비와 기간 버퍼가 필수입니다. 최악 시나리오(소송 장기화) 기준으로 입찰가를 설계하세요.');
  else notes.push('인도명령 가능 점유로 한정하고, 등기부·매각물건명세서·현황조사서 3종으로 인수권리 0을 확인하세요.');
  if(DIFF==='x'&&exp==='novice') notes.push('초보가 특수물건에 들어가면 권리분석 실패·명도 분쟁 위험이 매우 큽니다 — 안전물건으로 첫 5건 경험을 쌓길 권합니다.');
  if(exp==='novice') notes.push('초보의 진짜 위험은 권리가 아니라 고가낙찰입니다. 최근 실거래·급매가에서 역산한 입찰 상한선을 절대 넘기지 마세요(패찰을 두려워 말 것).');
  notes.push('본 검색조건은 투자성향 기반 참고용 가이드일 뿐 투자·세무·법률 자문이 아닙니다. 실제 입찰 전 권리분석·시세·대출(경락잔금대출 가용액·DSR)을 직접 확인하세요. 규제 수치는 00_regulations.md(2026-07-01) 기준이며 정책은 수시 변경됩니다.');

  return {
    region:{ str:regionStr+regSuffix, sido:sido||null, sigungu:sigungu||null, scope:rscope, site:rsite, axis_consistency:raxis },
    regulated_preference:regPref,
    property_type:ptypes,
    price_min:priceMin,
    price_max:priceMax, price_max_alt:priceMaxAlt, price_max_alt_label:priceMaxAltLabel,
    min_fail_count:mf,
    rights_difficulty:rights, rights_note:rightsNote, special_conditions:specialConds,
    area_pyeong:area, area_min_m2:areaMin, area_max_m2:areaMax,
    notes:notes
  };
}

function searchCriteriaJSON(r, sc){
  return {
    _meta:{
      schema:'04_search_criteria.json', schema_version:'1.0', track:'gyeongmae',
      type_code:r.code, generated_at:new Date().toISOString(), source:'부동산투자성향테스트.html',

    },
    region:sc.region.str,
    regulated_preference:sc.regulated_preference,
    property_type:sc.property_type,
    price_min:sc.price_min,
    price_max:sc.price_max,

    rights_difficulty:sc.rights_difficulty,
    area_pyeong:sc.area_pyeong,
    notes:sc.notes
  };
}

function searchCardShell(){
  var opts=SC_SIDO.map(function(s){ return '<option value="'+s+'">'+(s||'시/도 선택')+'</option>'; }).join('');
  return '<div class="sc-card">'
   +'<div class="sc-head"><span style="font-size:1.3rem">⚖️</span><h4>추천 경매 검색조건</h4></div>'
   +'<p class="sc-intro">당신의 유형(<b id="sc-code"></b>)과 입력 조건으로 <b>04_search_criteria.json</b> 규칙을 그대로 적용해 <b>courtauction.go.kr</b>에서 거를 수 있는 9개 검색 차원을 산출했습니다. <span style="color:#3f7d55;font-weight:600">[필터 O]</span>는 사이트에서 직접 거르는 조건, <span style="color:#2f6296;font-weight:600">[참고]</span>는 사이트로 못 거르는 메모입니다.</p>'
   +'<div class="sc-region-input">'
     +'<label>연고 시·군·구 지정 (선택) — 입력하면 region이 구체화됩니다</label>'
     +'<div class="row"><select id="sc-sido">'+opts+'</select><input id="sc-sigungu" type="text" placeholder="예: 수원시 영통구 / 부천시 / 동탄"></div>'
     +'<div class="hint">profile 입력에는 시·군·구 단위가 없어 직접 지정합니다. 미입력 시 시/도·범위 레벨로 표시됩니다.</div>'
   +'</div>'
   +'<div class="sc-dims" id="sc-dims"></div>'
   +'<div class="sc-notes" id="sc-notes"></div>'
   +'<div class="sc-export">'
     +'<div class="btn-row"><button class="btn btn-primary" id="sc-copy">📋 JSON 복사</button><button class="btn btn-ghost" id="sc-download">⬇ JSON 다운로드</button></div>'
     +'<textarea class="sc-json" id="sc-json" readonly spellcheck="false"></textarea>'
     +'<p class="sc-foot">스키마는 <code>04_search_criteria.json</code>의 dimensions 키(region·regulated_preference·property_type·price_min/max·min_fail_count·rights_difficulty·area_pyeong·notes)를 따릅니다. 스크래퍼·다른 도구 입력으로 재사용하세요. <b>검색조건은 참고용이며, 실제 입찰 전 권리분석·시세·대출을 반드시 확인하세요.</b></p>'
   +'</div>'
  +'</div>';
}

var _scR=null;
function initSearchCard(r){
  _scR=r;
  if($('sc-code')) $('sc-code').textContent=r.code;
  if($('sc-sido')) $('sc-sido').onchange=updateSearchCard;
  if($('sc-sigungu')) $('sc-sigungu').oninput=updateSearchCard;
  if($('sc-copy')) $('sc-copy').onclick=function(){
    var txt=$('sc-json').value;
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(function(){toast('검색조건 JSON이 복사됐어요');}).catch(function(){ $('sc-json').select(); toast('JSON 영역을 직접 복사하세요'); });
    else { $('sc-json').select(); try{document.execCommand('copy');toast('검색조건 JSON이 복사됐어요');}catch(e){toast('JSON 영역을 직접 복사하세요');} }
  };
  if($('sc-download')) $('sc-download').onclick=function(){
    var blob=new Blob([$('sc-json').value],{type:'application/json'});
    var url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='auction_search_'+_scR.code+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast('검색조건 JSON 파일을 내려받았어요');
  };
  updateSearchCard();
}
function scDim(label, siteOn, valueHtml, sub, full){
  var badge=siteOn?'<span class="site">필터 O</span>':'<span class="site nosite">참고</span>';
  return '<div class="sc-dim'+(full?' full':'')+'"><div class="dk">'+esc(label)+' '+badge+'</div><div class="dv">'+valueHtml+'</div>'+(sub?'<div class="dsub">'+sub+'</div>':'')+'</div>';
}
function updateSearchCard(){
  if(!_scR) return;
  var sidoEl=$('sc-sido'), sgEl=$('sc-sigungu');
  var sido=sidoEl?sidoEl.value:''; var sigungu=sgEl?(sgEl.value||'').trim():'';
  var sc=computeSearchCriteria(_scR, sido, sigungu);
  var dh='';
  dh+=scDim('지역 region', true, esc(sc.region.str), '범위: '+esc(sc.region.scope)+' · 사이트: '+esc(sc.region.site)+' (REGION='+esc(sc.region.axis_consistency)+')');
  dh+=scDim('규제 선호 regulated_preference', false, esc(sc.regulated_preference), 'courtauction에 규제지역 필터 없음 → region·notes로 안내');
  dh+=scDim('물건종류 property_type', true, sc.property_type.map(function(t){return '<span class="sc-tag">'+esc(t)+'</span>';}).join(''), null, true);
  dh+=scDim('최저가 하한 price_min', true, sc.price_min!=null?esc(scFmtKRW(sc.price_min)):'하한 없음', sc.price_min!=null?'소액 — 저가 권리·환금 불량 회피용 하한':'대액 — 우량 집중, 하한 없음');
  dh+=scDim('최저가 상한 price_max', true, esc(scFmtKRW(sc.price_max)), sc.price_max_alt_label?esc(sc.price_max_alt_label):'자기자본 밴드 상단 × LTV배수 × 보수계수');
  dh+=scDim('유찰 회수 min_fail_count', true, '≥ '+sc.min_fail_count+'회', '1회 유찰 시 통상 최저가 20~30%↓(법원별 상이)');
  var rv=sc.rights_difficulty==='safe'?'안전 (safe)':'특수 허용 (special_ok)';
  dh+=scDim('권리 난이도 rights_difficulty', true, esc(rv), esc(sc.rights_note)+(sc.special_conditions.length?' · 체크: '+sc.special_conditions.map(esc).join(', '):''), true);
  dh+=scDim('전용면적 area_pyeong', true, esc(sc.area_pyeong), '사이트: 전용면적 범위(㎡)로 필터');
  $('sc-dims').innerHTML=dh;
  $('sc-notes').innerHTML='<div class="sc-dim full"><div class="dk">메모 notes <span class="site nosite">참고</span></div><ul>'+sc.notes.map(function(n){return '<li>'+inlineFmt(n)+'</li>';}).join('')+'</ul></div>';
  $('sc-json').value=JSON.stringify(searchCriteriaJSON(_scR, sc), null, 2);
}
function conditionText(data, pv){
  const parts=[];
  (data.profile_inputs||[]).forEach(inp=>{
    if(pv[inp.id]!==undefined){
      const opt=inp.options.find(o=>o.value===pv[inp.id]);
      if(opt) parts.push(inp.label+': '+opt.label);
    }
  });
  return '<b>입력한 조건</b> · '+parts.join('  ·  ');
}
function restart(){
  state={ track:null, steps:[], stepIndex:0, answers:{}, profile:{} };
  history.replaceState(null,'',location.pathname);
  $('progress').style.width='0%';
  $('start-btn').disabled=true; $('start-btn').textContent='트랙을 선택하세요';
  document.querySelectorAll('.track-card').forEach(c=>c.classList.remove('sel'));
  show('screen-start');
}

/* ---------- save / share via URL ---------- */
function saveToURL(track, r){
  const payload={ t:track, p:r.profileValues||{}, a:answerCodes() };
  const enc=encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
  const url=location.pathname+'?r='+enc;
  history.replaceState(null,'',url);
  try{ localStorage.setItem('rmbti_last', JSON.stringify(payload)); }catch(e){}
}
function answerCodes(){
  // store selected option indexes to allow full re-score on reload
  const out={};
  for(const k in state.answers) out['q:'+k]=state.answers[k].__i;
  for(const k in state.profile) out['p:'+k]=state.profile[k].__i;
  return out;
}
function copyShare(){
  const url=location.href;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast('결과 링크가 복사됐어요')).catch(()=>toast('주소창의 URL을 복사하세요'));
  } else toast('주소창의 URL을 복사하세요');
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- restore from URL ---------- */
function tryRestore(){
  const params=new URLSearchParams(location.search);
  let payload=null;
  if(params.get('r')){
    try{ payload=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(params.get('r')))))); }catch(e){ payload=null; }
  }
  if(!payload){ try{ const ls=localStorage.getItem('rmbti_last'); /* do not auto-load LS, only URL */ }catch(e){} }
  if(payload && DATA[payload.t]){
    const data=DATA[payload.t];
    state.track=payload.t; state.answers={}; state.profile={};
    const codes=payload.a||{};
    data.questions.forEach(q=>{ const ix=codes['q:'+q.id]; if(ix!=null && q.options[ix]) state.answers[q.id]=Object.assign({__i:ix},q.options[ix]); });
    (data.profile_inputs||[]).forEach(p=>{ const ix=codes['p:'+p.id]; if(ix!=null && p.options[ix]) state.profile[p.id]=Object.assign({__i:ix},p.options[ix]); });
    const r=scoreTrack(data, state.answers, state.profile);
    renderResult(payload.t, r);
    show('screen-result');
    return true;
  }
  return false;
}

/* ---------- init ---------- */
renderStart();
if(!tryRestore()){ show('screen-start'); }
</script>
